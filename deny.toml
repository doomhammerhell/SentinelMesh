[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "MPL-2.0",
  "OpenSSL",
  "Zlib",
  "CDLA-Permissive-2.0",
]

[advisories]
ignore = [
  # fxhash 0.2.1 – unmaintained (transitive from sled, no replacement available)
  "RUSTSEC-2025-0057",
  # instant 0.1.13 – unmaintained (transitive from sled via parking_lot 0.11)
  "RUSTSEC-2024-0384",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
