# Dependency review configuration
# https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/configuring-dependency-review

# These vulnerabilities are inherited from solana-sdk 1.18.x (contracts/sentinelmesh-canary-client)
# and cannot be resolved without an upstream Solana SDK major version bump.
allow-ghsas:
  # quinn-proto >=0.5.0,<0.11.14 – DoS via panic in QUIC transport parameter parsing
  - GHSA-6xvm-j4wr-6v98
  # ed25519-dalek <2 – Double Public Key Signing Function Oracle Attack
  - GHSA-w5vr-6qhr-36cc
  # ring <0.17.12 – AES functions panic when overflow checking is enabled
  - GHSA-4p46-pwfr-66x6
  - GHSA-c86p-w88r-qvqr
  # curve25519-dalek <4.1.3 – Timing variability in Scalar29::sub/Scalar52::sub
  - GHSA-x4gp-pqpj-f43q
  # borsh <1.0.0-alpha.1 – Parsing ZST which are not Copy/Clone is unsound
  - GHSA-fjx5-qpf4-xjf2
  # atty – potential unaligned read (solana-logger pins atty 0.2.x via clap 2.x)
  - GHSA-g98v-hv3f-hcfr
