# These vulnerabilities are inherited from solana-sdk 1.18.x and cannot be
# resolved without an upstream Solana SDK major version bump.
# Tracked: https://github.com/solana-labs/solana/issues
[advisories]
ignore = [
    # quinn-proto DoS (solana-streamer pins quinn 0.10.x)
    "RUSTSEC-2026-0037",
    # ed25519-dalek double public key oracle (solana-sdk pins 1.0.1)
    "RUSTSEC-2022-0093",
    # ring AES panic (solana-streamer pins ring 0.16.x via rcgen)
    "RUSTSEC-2025-0009",
    # curve25519-dalek timing variability (solana-program pins 3.2.1)
    "RUSTSEC-2024-0344",
]
